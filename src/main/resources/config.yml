wand-lore:
  - "&6&l● Left Click &7to select Position 1"
  - "&6&l● Right Click &7to select Position 2"
wand-material: STICK

not-selected: "&cYou must select both &fPosition 1 &cand &fPosition 2&c first."

arena-removed: "&aSuccessfully removed arena &f%arena%&a."
arena-remove-failed: "&cFailed to delete the schematic file for arena &f%arena%&c."
arena-not-found: "&cThe specified arena could not be found."
arena-named-already: "&cThere is already an arena named &f%arena%&c."
arena-loading-error: "&cError loading arena."
arena-folder-missing: "&cArena folder does not exist. Please ensure it is created."
arena-save: "&aArena saved as &f%arena%.schem&a."
arena-failed: "&cFailed to save arena."

position-1-set: "&6Position 1 set at &7(%pos1_x%, %pos1_y%, %pos1_z%)"
position-2-set: "&6Position 2 set at &7(%pos2_x%, %pos2_y%, %pos2_z%)"
