# FastArenas Configuration
# -----------------------------------------------------------------------------
# Customize messages, arenas, and spawn points for your server.
# Colors: legacy (&a, &c) and hex (#rrggbb)

# Permissions
# -----------------------------------------------------------------------------
# fastarena.reset     - /fa reset <arena>
# fastarena.autoreset - /fa autoreset <arena> <seconds>
# fastarena.create    - /fa create <arena> [format]
# fastarena.reload    - /fa reload
# fastarena.start     - /fa start <arena>
# fastarena.stop      - /fa stop <arena>
# fastarena.wand      - /fa wand
# fastarena.remove    - /fa remove <arena>
# fastarena.list      - /fa list
# fastarena.setspawn  - /fa setspawn [name]
# fastarena.admin     - all /fa commands

# PlaceholderAPI
# -----------------------------------------------------------------------------
# %fastarena_timer_<arena>%         -> 1h 2m 5s
# %fastarena_timer_<arena>_second%  -> 5
# %fastarena_timer_<arena>_minute%  -> 2
# %fastarena_timer_<arena>_hour%    -> 1

# Arenas
# -----------------------------------------------------------------------------

# Skip Blocks
blacklist-Blocks:
  - chest
  - bell

spawn:
  default:
    world: world
    pos:
      - 0
      - 0
      - 0
    yaw: 0
    pitch: 0

arena:
  example:
    name: "ArenaNameHere"
    world: world
    pos1:
      - 0
      - 0
      - 0
    pos2:
      - 0
      - 0
      - 0
    message: "&aArena %arena% has been reseted!"
    clearitems: true
    clearcrystal: true
    tpplayers: false
    spawn: default
    enabled: false
    offset: 0
    autoreset: 0

# Messages
# -----------------------------------------------------------------------------
# to remove Broadcast message just make it empty ( "" )

# action_bar , message , title
message-type: message

console-message: "&cOnly players can execute this command in-game."
permission: "You Don't have Permission To use this command"

